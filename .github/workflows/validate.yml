name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  INTEGRATION_DIR: custom_components/tmd_alerts

jobs:
  validate:
    name: Validate Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib
          failed = False
          for f in pathlib.Path('custom_components/tmd_alerts').rglob('*.json'):
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  print(f'FAIL {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Check Python syntax
        run: |
          python3 - <<'EOF'
          import ast, sys, pathlib
          failed = False
          for f in pathlib.Path('custom_components/tmd_alerts').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'FAIL {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Validate manifest.json
        run: |
          python3 - <<'EOF'
          import json, sys
          m = json.load(open('custom_components/tmd_alerts/manifest.json'))
          required = ['domain', 'name', 'version', 'codeowners', 'iot_class', 'config_flow']
          missing = [k for k in required if k not in m]
          if missing:
              print(f'manifest.json missing keys: {missing}')
              sys.exit(1)
          if not m.get('config_flow'):
              print('config_flow must be true')
              sys.exit(1)
          print(f'manifest.json OK — domain={m["domain"]} version={m["version"]}')
          EOF

      - name: Validate hacs.json
        run: |
          python3 - <<'EOF'
          import json, sys
          try:
              h = json.load(open('hacs.json'))
          except FileNotFoundError:
              print('hacs.json missing at repo root')
              sys.exit(1)
          if 'name' not in h:
              print('hacs.json missing required "name" field')
              sys.exit(1)
          print(f'hacs.json OK — name={h["name"]}')
          EOF

      - name: Check required files
        run: |
          BASE="custom_components/tmd_alerts"
          REQUIRED=(
            "${BASE}/__init__.py"
            "${BASE}/manifest.json"
            "${BASE}/config_flow.py"
            "${BASE}/const.py"
            "${BASE}/coordinator.py"
            "${BASE}/sensor.py"
            "${BASE}/binary_sensor.py"
            "${BASE}/strings.json"
            "${BASE}/translations/en.json"
            "hacs.json"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present"

      - name: Check translations match strings
        run: |
          python3 - <<'EOF'
          import json, sys

          def flatten(d, prefix=''):
              keys = set()
              for k, v in d.items():
                  path = f'{prefix}.{k}' if prefix else k
                  if isinstance(v, dict):
                      keys |= flatten(v, path)
                  else:
                      keys.add(path)
              return keys

          base = 'custom_components/tmd_alerts'
          strings = flatten(json.load(open(f'{base}/strings.json')))
          en = flatten(json.load(open(f'{base}/translations/en.json')))
          missing = strings - en
          extra = en - strings
          if missing:
              print(f'translations/en.json missing keys: {missing}')
              sys.exit(1)
          if extra:
              print(f'translations/en.json has extra keys not in strings.json: {extra}')
              sys.exit(1)
          print('translations/en.json in sync with strings.json')
          EOF
