name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  INTEGRATION_DIR: custom_components/tmd_alerts

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Skip bot release commits (contain [skip ci]) ──────────────────────
      - name: Skip bot commits
        id: bot_check
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Bot commit — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Determine release version (auto-increment patch if tag exists) ────
      - name: Determine version
        if: steps.bot_check.outputs.skip == 'false'
        id: version
        run: |
          BASE=$(python3 -c "import json; print(json.load(open('${{ env.INTEGRATION_DIR }}/manifest.json'))['version'])")

          if git ls-remote --exit-code --tags origin "refs/tags/v${BASE}" > /dev/null 2>&1; then
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Tag v${BASE} exists — auto-incremented to ${VERSION}"
          else
            VERSION="${BASE}"
            echo "Using version ${VERSION} from manifest"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Write new version into manifest so the zip ships the correct version
          python3 -c "
          import json, pathlib
          p = pathlib.Path('${{ env.INTEGRATION_DIR }}/manifest.json')
          m = json.loads(p.read_text())
          m['version'] = '${VERSION}'
          p.write_text(json.dumps(m, indent=2) + '\n')
          "

      # ── Generate CHANGELOG entry and update CHANGELOG.md ─────────────────
      - name: Generate changelog
        if: steps.bot_check.outputs.skip == 'false'
        env:
          CL_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DATE=$(date +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CL_DATE="$DATE" CL_PREV_TAG="$PREV_TAG" python3 << 'PYEOF'
          import subprocess, os, re, pathlib

          version  = os.environ["CL_VERSION"]
          date     = os.environ["CL_DATE"]
          prev_tag = os.environ.get("CL_PREV_TAG", "")
          range_spec = f"{prev_tag}..HEAD" if prev_tag else "HEAD"

          result = subprocess.run(
              ["git", "log", range_spec, "--pretty=%s", "--no-merges"],
              capture_output=True, text=True
          )

          sections = {
              "Added": [], "Fixed": [], "Changed": [],
              "Documentation": [], "Maintenance": [], "Other": [],
          }
          prefix_map = {
              "feat": "Added", "fix": "Fixed",
              "refactor": "Changed", "perf": "Changed",
              "docs": "Documentation", "chore": "Maintenance",
              "style": "Other", "test": "Other",
          }

          for msg in result.stdout.strip().splitlines():
              msg = msg.strip()
              if not msg or "[skip ci]" in msg:
                  continue
              m = re.match(r'^(\w+)(?:\(.+?\))?!?:\s*(.+)', msg)
              if m and m.group(1) in prefix_map:
                  sections[prefix_map[m.group(1)]].append(m.group(2).strip())
              else:
                  sections["Other"].append(msg)

          entry_lines = [f"## [{version}] - {date}", ""]
          for section, items in sections.items():
              if items:
                  entry_lines.append(f"### {section}")
                  for item in items:
                      entry_lines.append(f"- {item}")
                  entry_lines.append("")
          entry = "\n".join(entry_lines).rstrip() + "\n"

          pathlib.Path("/tmp/changelog_entry.md").write_text(entry)

          install = (
              "\n---\n\n"
              "## Installation\n\n"
              "### HACS (recommended)\n"
              "Add `simplemice/ha_tmd_alerts` as a custom repository in HACS "
              "(category: Integration), then install **Thailand Weather Alerts (TMD)**.\n\n"
              "### Manual\n"
              f"Download `tmd_alerts_v{version}.zip` below, extract it, and copy the "
              "`tmd_alerts/` folder to `config/custom_components/`.  \n"
              "Restart Home Assistant.\n"
          )
          pathlib.Path("/tmp/release_body.md").write_text(entry + install)

          cl = pathlib.Path("CHANGELOG.md")
          existing = cl.read_text() if cl.exists() else ""
          marker = "## ["
          if marker in existing:
              new_content = existing.replace(marker, entry + "\n---\n\n" + marker, 1)
          elif "---" in existing:
              idx = existing.rfind("---")
              new_content = existing[:idx + 3] + "\n\n" + entry + existing[idx + 3:]
          else:
              header = (
                  "# Changelog\n\n"
                  "All notable changes to this project will be documented in this file.\n\n"
                  "Format based on [Keep a Changelog](https://keepachangelog.com).\n\n"
                  "---\n\n"
              )
              new_content = header + entry
          cl.write_text(new_content)
          print(entry)
          PYEOF

      # ── Commit manifest.json + CHANGELOG.md and capture the new SHA ───────
      # The release tag will point to this commit so manifest version matches.
      - name: Commit and push version + changelog
        if: steps.bot_check.outputs.skip == 'false'
        id: bot_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.INTEGRATION_DIR }}/manifest.json CHANGELOG.md
          if git diff --cached --quiet; then
            # Nothing changed (rare edge case) — tag the current HEAD
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
            git push
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Validate JSON files
        if: steps.bot_check.outputs.skip == 'false'
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib
          failed = False
          for f in pathlib.Path('custom_components/tmd_alerts').rglob('*.json'):
              try: json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  print(f'FAIL {f}: {e}'); failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Check Python syntax
        if: steps.bot_check.outputs.skip == 'false'
        run: |
          python3 - <<'EOF'
          import ast, sys, pathlib
          failed = False
          for f in pathlib.Path('custom_components/tmd_alerts').rglob('*.py'):
              try: ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'FAIL {f}: {e}'); failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Check required files
        if: steps.bot_check.outputs.skip == 'false'
        run: |
          BASE="custom_components/tmd_alerts"
          for f in "${BASE}/__init__.py" "${BASE}/manifest.json" "${BASE}/config_flow.py" \
                   "${BASE}/const.py" "${BASE}/coordinator.py" "${BASE}/sensor.py" \
                   "${BASE}/binary_sensor.py" "${BASE}/strings.json" \
                   "${BASE}/translations/en.json" "hacs.json"; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
          done
          echo "All required files present"

      # ── Build zip from the current workspace (has updated manifest) ───────
      - name: Build release zip
        if: steps.bot_check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPNAME="tmd_alerts_v${VERSION}.zip"
          cd custom_components && zip -r "${GITHUB_WORKSPACE}/${ZIPNAME}" tmd_alerts/
          ls -lh "${GITHUB_WORKSPACE}/${ZIPNAME}"
          echo "zip_name=${ZIPNAME}" >> "$GITHUB_ENV"

      # ── Create GitHub Release — tag points to the bot commit ──────────────
      - name: Create GitHub Release
        if: steps.bot_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          target_commitish: ${{ steps.bot_commit.outputs.sha }}
          body_path: /tmp/release_body.md
          make_latest: true
          files: ${{ env.zip_name }}
