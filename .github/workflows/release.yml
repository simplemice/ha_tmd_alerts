name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Read version from manifest.json ───────────────────────────────────
      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Manifest version: ${VERSION}"

      # ── Skip if this version tag already has a release ────────────────────
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — skipping release"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} not found — will create release"
          fi

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Validate JSON files
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib
          failed = False
          for f in pathlib.Path('.').rglob('*.json'):
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  print(f'FAIL {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Check Python syntax
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 - <<'EOF'
          import ast, sys, pathlib
          failed = False
          for f in pathlib.Path('.').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'FAIL {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Check required files
        if: steps.check.outputs.skip == 'false'
        run: |
          REQUIRED=(
            "__init__.py"
            "manifest.json"
            "config_flow.py"
            "const.py"
            "coordinator.py"
            "sensor.py"
            "binary_sensor.py"
            "strings.json"
            "translations/en.json"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present"

      # ── Build release zip ─────────────────────────────────────────────────
      - name: Build release zip
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPNAME="tmd_alerts_v${VERSION}.zip"

          cd ..
          zip -r "tmd_alerts/${ZIPNAME}" tmd_alerts/ \
            --exclude "tmd_alerts/.git/*" \
            --exclude "tmd_alerts/.github/*" \
            --exclude "tmd_alerts/.claude/*" \
            --exclude "tmd_alerts/LICENSE*" \
            --exclude "tmd_alerts/README.md" \
            --exclude "tmd_alerts/__pycache__/*" \
            --exclude "tmd_alerts/*.pyc"
          cd tmd_alerts

          ls -lh "${ZIPNAME}"
          echo "zip_name=${ZIPNAME}" >> "$GITHUB_ENV"

      # ── Create release (action creates tag + release atomically) ──────────
      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          make_latest: true
          files: ${{ env.zip_name }}
          body: |
            ## Installation

            ### HACS
            Add this repository as a custom repository in HACS, then install **Thailand Weather Alerts (TMD)**.

            ### Manual
            Download `${{ env.zip_name }}`, extract it, and copy the `tmd_alerts/` folder into `config/custom_components/`.
            Restart Home Assistant.

            ---
