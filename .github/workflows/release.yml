name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Read version from manifest.json ───────────────────────────────────
      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Manifest version: $VERSION"

      # ── Skip if this version tag was already released ─────────────────────
      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — nothing to release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is new — proceeding with release"
          fi

      # ── Validate (only when releasing) ────────────────────────────────────
      - name: Validate JSON files
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          python3 -c "
          import json, sys, pathlib
          failed = False
          for f in pathlib.Path('.').rglob('*.json'):
            try:
              json.loads(f.read_text())
            except json.JSONDecodeError as e:
              print(f'FAIL {f}: {e}')
              failed = True
          if failed:
            sys.exit(1)
          print('All JSON files valid')
          "

      - name: Check Python syntax
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          python3 -c "
          import ast, sys, pathlib
          failed = False
          for f in pathlib.Path('.').rglob('*.py'):
            try:
              ast.parse(f.read_text())
            except SyntaxError as e:
              print(f'FAIL {f}: {e}')
              failed = True
          if failed:
            sys.exit(1)
          print('All Python files valid')
          "

      - name: Check required files exist
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          REQUIRED=(
            "__init__.py"
            "manifest.json"
            "config_flow.py"
            "const.py"
            "coordinator.py"
            "sensor.py"
            "binary_sensor.py"
            "strings.json"
            "translations/en.json"
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            [ -f "$f" ] || MISSING+=("$f")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required files: ${MISSING[*]}"
            exit 1
          fi
          echo "All required files present"

      # ── Build release zip ─────────────────────────────────────────────────
      - name: Build release zip
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPNAME="tmd_alerts_v${VERSION}.zip"

          cd ..
          zip -r "tmd_alerts/${ZIPNAME}" tmd_alerts/ \
            --exclude "tmd_alerts/.git/*" \
            --exclude "tmd_alerts/.github/*" \
            --exclude "tmd_alerts/.claude/*" \
            --exclude "tmd_alerts/LICENSE*" \
            --exclude "tmd_alerts/README.md" \
            --exclude "tmd_alerts/__pycache__/*" \
            --exclude "tmd_alerts/*.pyc"
          cd tmd_alerts

          echo "zip_name=${ZIPNAME}" >> "$GITHUB_ENV"
          echo "Built ${ZIPNAME} — $(du -sh ${ZIPNAME} | cut -f1)"

      # ── Tag the commit ────────────────────────────────────────────────────
      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      # ── Publish release ───────────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          make_latest: true
          files: ${{ env.zip_name }}
          body: |
            ## Installation

            ### HACS
            Add this repository as a custom repository in HACS, then install **Thailand Weather Alerts (TMD)**.

            ### Manual
            Download `${{ env.zip_name }}`, extract it, and copy the `tmd_alerts/` folder into `config/custom_components/`.
            Restart Home Assistant.

            ---
