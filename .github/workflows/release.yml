name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  INTEGRATION_DIR: custom_components/tmd_alerts

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Read version from manifest.json ───────────────────────────────────
      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('${{ env.INTEGRATION_DIR }}/manifest.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Manifest version: ${VERSION}"

      # ── Skip if this version tag already has a release ────────────────────
      - name: Check if release already exists
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — skipping release"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} not found — will create release"
          fi

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Validate JSON files
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib
          failed = False
          for f in pathlib.Path('custom_components/tmd_alerts').rglob('*.json'):
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  print(f'FAIL {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Check Python syntax
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 - <<'EOF'
          import ast, sys, pathlib
          failed = False
          for f in pathlib.Path('custom_components/tmd_alerts').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'FAIL {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Check required files
        if: steps.check.outputs.skip == 'false'
        run: |
          BASE="custom_components/tmd_alerts"
          REQUIRED=(
            "${BASE}/__init__.py"
            "${BASE}/manifest.json"
            "${BASE}/config_flow.py"
            "${BASE}/const.py"
            "${BASE}/coordinator.py"
            "${BASE}/sensor.py"
            "${BASE}/binary_sensor.py"
            "${BASE}/strings.json"
            "${BASE}/translations/en.json"
            "hacs.json"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present"

      # ── Build release zip ─────────────────────────────────────────────────
      - name: Build release zip
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPNAME="tmd_alerts_v${VERSION}.zip"

          # Zip directly from custom_components/ so archive contains tmd_alerts/<files>
          cd custom_components
          zip -r "${GITHUB_WORKSPACE}/${ZIPNAME}" tmd_alerts/
          cd "${GITHUB_WORKSPACE}"

          ls -lh "${ZIPNAME}"
          echo "zip_name=${ZIPNAME}" >> "$GITHUB_ENV"

      # ── Create release (action creates tag + release atomically) ──────────
      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          make_latest: true
          files: ${{ env.zip_name }}
          body: |
            ## Installation

            ### HACS (recommended)
            Add `simplemice/ha_tmd_alerts` as a custom repository in HACS (category: Integration), then install **Thailand Weather Alerts (TMD)**.

            ### Manual
            Download `${{ env.zip_name }}`, extract it, and copy the `tmd_alerts/` folder into `config/custom_components/`.
            Restart Home Assistant.

            ---
